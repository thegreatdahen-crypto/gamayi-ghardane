<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گەمەی غاردانێ</title>
    <style>
        /* کۆدەکانی CSS بۆ دیزاین */
        body {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #87CEEB, #98FB98);
            overflow: hidden;
            direction: rtl; /* بۆ ئەوەی نووسینەکان لە ڕاستەوە بۆ چەپ بن */
        }

        .screen {
            position: absolute;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4, #45B7D1, #96CEB4);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite; /* ئەنیمەیشنی گۆڕانی ڕەنگی باکگراوند */
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .title {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: bold;
            color: #2C3E50;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            margin-bottom: 1rem;
            text-align: center;
        }

        .subtitle {
            font-size: clamp(1rem, 4vw, 1.5rem);
            color: #34495E;
            margin-bottom: 2rem;
            text-align: center;
        }

        .creator-info {
            font-size: clamp(0.8rem, 3vw, 1rem);
            color: #2C3E50;
            text-align: center;
            margin-bottom: 2rem;
            line-height: 1.6;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 10px;
        }

        .button {
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4);
            border: none;
            padding: 1rem 2rem;
            margin: 0.5rem;
            border-radius: 25px;
            color: white;
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            min-width: 200px;
        }

        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .mode-description {
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            color: #333;
            text-align: center;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
            max-width: 300px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    
    <!-- پێکهاتەی شاشەکە -->
    <div class="screen">
        <h1 class="title">گەمەی غاردانێ</h1>
        <p class="subtitle">دەزانی غاردەی؟</p>
        
        <div class="creator-info">
            دروستکراوە لەلایەن: داهێن دیدار<br>
            کوردستان - هەولێر - لاوان سیتی - خانوو ژمارە ٣٥١
        </div>

        <button class="button" onclick="chooseMode('normal')">نۆڕماڵ</button>
        <p class="mode-description">ئەگەر مردی، لە سەرەتاوە دەست پێدەکەیتەوە.</p>

        <button class="button" onclick="chooseMode('hard')">قورس</button>
        <p class="mode-description">ئەگەر گەیشتی بە ئاستی ٦، یارییەکە پاشەکەوت دەبێت.</p>
    </div>

    <!-- کۆدەکانی جاڤاسکریپت بۆ کارکردنی دوگمەکان -->
    <script>
        function chooseMode(mode) {
            if (mode === 'normal') {
                alert('نۆڕماڵ مۆد هەڵبژێردرا! یارییەکە لێرەوە دەست پێدەکات...');
                // لە داهاتوودا کۆدی دەستپێکردنی یارییەکە لێرە دادەنرێت
            } else if (mode === 'hard') {
                alert('قورس مۆد هەڵبژێردرا! ئاگاداربە یارییەکە سەختە...');
                // لە داهاتوودا کۆدی دەستپێکردنی یارییەکە لێرە دادەنرێت
            }
        }
    </script>
</body>
</html>
